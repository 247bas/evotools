<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Playground — run the evo-cookbook live · evotools</title>
  <meta name="description" content="Run the evo-cookbook recipes live against Dash Platform testnet, right in your browser. Edit the code and hit run — no install." />
  <link rel="stylesheet" href="/shared/theme.css" />
  <link rel="stylesheet" href="css/playground.css" />
</head>
<body>
  <div class="wrap pg-wrap">
    <p class="tagline">
      Run the <a href="https://github.com/247bas/evo-cookbook" target="_blank" rel="noopener">evo-cookbook</a>
      recipes live against Dash testnet — edit the code and hit run. It executes
      in your browser against the real network, no install. Recipes marked
      <span class="dollar">$</span> need a funded identity to fully run.
    </p>

    <div class="pg-grid">
      <aside class="pg-list" id="recipeList"></aside>

      <section class="pg-main">
        <div class="pg-head">
          <h2 id="recipeTitle">…</h2>
          <p class="pg-blurb" id="recipeBlurb"></p>
        </div>

        <div class="pg-toolbar">
          <button class="btn primary" id="runBtn">▶ Run</button>
          <button class="btn ghost sm" id="resetBtn">Reset</button>
          <button class="btn ghost sm" id="envToggle">Environment</button>
          <a class="btn ghost sm" id="viewSource" href="#" target="_blank" rel="noopener">View on GitHub ↗</a>
          <span class="pg-hint">⌘/Ctrl + Enter</span>
        </div>

        <div class="pg-env" id="envBox" hidden>
          <label for="envInput">Optional environment — one <code>KEY=value</code> per line. Paste your onboard <code>.env</code> to run the write path for real.</label>
          <textarea id="envInput" spellcheck="false" placeholder="EVO_IDENTITY_ID=...&#10;EVO_PRIVATE_WIF=..."></textarea>
        </div>

        <textarea class="pg-code" id="codeEditor" spellcheck="false" autocomplete="off" autocapitalize="off"></textarea>

        <div class="pg-output" id="output"><div class="pg-output-empty">Output appears here.</div></div>
      </section>
    </div>
  </div>

  <script type="module" src="/shared/nav.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
