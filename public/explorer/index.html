<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Explorer — browse Dash Platform · evotools</title>
  <meta name="description" content="Look up identities, DPNS names, data contracts and documents on Dash Platform (testnet or mainnet) — with the SDK snippet that fetched each one." />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="evotools" />
  <meta property="og:title" content="Explorer — browse Dash Platform" />
  <meta property="og:description" content="Browse identities, DPNS names, contracts and tokens on Dash Platform (testnet or mainnet), with proofs." />
  <meta property="og:url" content="https://evotools.dev/explorer/" />
  <meta property="og:image" content="https://evotools.dev/og/explorer.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Explorer — browse Dash Platform" />
  <meta name="twitter:description" content="Browse identities, DPNS names, contracts and tokens on Dash Platform (testnet or mainnet), with proofs." />
  <meta name="twitter:image" content="https://evotools.dev/og/explorer.png" />
  <link rel="stylesheet" href="/shared/theme.css" />
  <link rel="stylesheet" href="css/explorer.css" />
</head>
<body>
  <div class="wrap ex-wrap">
    <p class="tagline">
      Look up an identity, a <code>.dash</code> name, or a data contract on Dash
      Platform — switch between testnet and mainnet. Every result comes with the
      SDK snippet that fetched it.
    </p>

    <div class="ex-search">
      <select id="kind" aria-label="What to look up">
        <option value="auto">Auto-detect</option>
        <option value="identity">Identity</option>
        <option value="name">DPNS name</option>
        <option value="contract">Data contract</option>
        <option value="token">Token</option>
      </select>
      <input id="q" type="text" autocomplete="off" spellcheck="false" placeholder="Identity ID (base58)" />
      <button class="btn primary" id="searchBtn">Search</button>
    </div>

    <div class="ex-controls">
      <div class="ex-left">
        <select id="netsel" class="ex-netsel" aria-label="Network">
          <option value="testnet">testnet</option>
          <option value="mainnet">mainnet</option>
        </select>
        <label class="ex-proof"><input type="checkbox" id="proof" /> Verify with proof</label>
      </div>
      <span class="ex-net" id="net"></span>
    </div>

    <div class="ex-examples" id="examples"></div>

    <div class="error" id="err" hidden></div>
    <div id="results"></div>

    <details class="ex-dev">
      <summary>Developer tools</summary>
      <div class="ex-dev-body">
        <label for="stInput">Decode a state transition (base64 or hex). It runs in your browser; Broadcast submits it to the network.</label>
        <textarea id="stInput" spellcheck="false" autocomplete="off" placeholder="Paste a state transition blob…"></textarea>
        <div class="ex-dev-btns">
          <button class="btn primary sm" id="decodeBtn">Decode</button>
          <button class="btn ghost sm" id="broadcastBtn">Broadcast ↗</button>
        </div>
        <div id="stOut"></div>
      </div>
    </details>
  </div>

  <script type="module" src="/shared/nav.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
