<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Explorer — browse Dash Platform · evotools</title>
  <meta name="description" content="Look up identities, DPNS names, data contracts and documents on Dash Platform (testnet or mainnet) — with the SDK snippet that fetched each one." />
  <link rel="stylesheet" href="/shared/theme.css" />
  <link rel="stylesheet" href="css/explorer.css" />
</head>
<body>
  <div class="wrap ex-wrap">
    <p class="tagline">
      Look up an identity, a <code>.dash</code> name, or a data contract on Dash
      Platform — switch between testnet and mainnet. Every result comes with the
      SDK snippet that fetched it.
    </p>

    <div class="ex-search">
      <select id="kind" aria-label="What to look up">
        <option value="identity">Identity</option>
        <option value="name">DPNS name</option>
        <option value="contract">Data contract</option>
        <option value="token">Token</option>
      </select>
      <input id="q" type="text" autocomplete="off" spellcheck="false" placeholder="Identity ID (base58)" />
      <button class="btn primary" id="searchBtn">Search</button>
    </div>

    <div class="ex-controls">
      <div class="ex-left">
        <select id="netsel" class="ex-netsel" aria-label="Network">
          <option value="testnet">testnet</option>
          <option value="mainnet">mainnet</option>
        </select>
        <label class="ex-proof"><input type="checkbox" id="proof" /> Verify with proof</label>
      </div>
      <span class="ex-net" id="net"></span>
    </div>

    <div class="ex-examples" id="examples"></div>

    <div class="error" id="err" hidden></div>
    <div id="results"></div>
  </div>

  <script type="module" src="/shared/nav.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
